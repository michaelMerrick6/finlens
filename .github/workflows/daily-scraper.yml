name: Daily Data Scraper

on:
  schedule:
    # Runs at 21:00 UTC (4:00 PM EST / 5:00 PM EDT) automatically on Mon-Fri
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  scrape-and-ingest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run Scraper Scripts
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        echo "Running Politician Trades Scraper..."
        python scripts/scrape_politicians.py
        
        echo "Running Form 4 Scraper..."
        python scripts/scrape_form4.py
        
        echo "Running 13F-HR Scraper..."
        python scripts/scrape_13f.py

    - name: Notify on Failure
      if: failure()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        curl -H "Content-Type: application/json" -d '{"content": "🚨 **FinLens Alert**: The daily data scraper GitHub Action has failed! Please check the repository logs."}' $DISCORD_WEBHOOK_URL
