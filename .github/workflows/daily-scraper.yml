name: Trade Data Monitor

on:
  schedule:
    # Run hourly on weekdays so congressional filings are picked up faster.
    - cron: '15 * * * 1-5'
    # Weekend catch-up run every 4 hours.
    - cron: '45 */4 * * 0,6'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape-and-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install OCR system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr poppler-utils

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run Full Scraper Pipeline
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        FINLENS_DAILY_MODE: '1'
      run: |
        echo "Running Trade Data Monitor Pipeline..."
        python scripts/daily_scraper.py

    - name: Notify on Failure
      if: failure()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        curl -H "Content-Type: application/json" -d '{"content": "🚨 **FinLens Alert**: The trade data monitor has failed! Please check the GitHub Actions logs."}' $DISCORD_WEBHOOK_URL
