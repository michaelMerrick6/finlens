name: Capture Insider Trades

on:
  schedule:
    # SEC Form 4 filings can arrive throughout the business day. Poll hourly
    # and let the freshness guard fail loudly if the DB falls behind the feed.
    - cron: '35 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: capture-insider
  cancel-in-progress: true

jobs:
  capture-insider:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run SEC Parser Tests
      if: github.event_name == 'workflow_dispatch'
      working-directory: scripts
      run: |
        python -m pytest test_sec_form4_support.py -v || python test_sec_form4_support.py
        python test_schema_performance_indexes.py

    - name: Capture SEC Form 4 Filings
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        FINLENS_DAILY_MODE: '1'
        SEC_DAILY_MAX_FILINGS: '120'
        SEC_DAILY_MAX_PAGES: '3'
        SEC_DAILY_RECENT_SCAN_DAYS: '10'
        SEC_RECENT_SYNC_LIMIT: '120'
        SEC_RECENT_SYNC_PAGES: '3'
        SEC_RECENT_AUDIT_LIMIT: '120'
        SEC_RECENT_AUDIT_PAGES: '3'
        CAPTURE_FRESHNESS_SOURCE_LIMIT: '120'
        CAPTURE_FRESHNESS_SEC_PAGES: '3'
        CAPTURE_FRESHNESS_PARSE_LIMIT: '40'
        SEC_DAILY_EXISTING_STOP: '40'
      run: |
        cd scripts
        echo "=== SEC Daily Ingest ==="
        python ingest_sec_daily.py
        echo "=== SEC Recent Sync ==="
        python sync_recent_sec_filings.py --fresh-feed
        echo "=== SEC Audit ==="
        python ../ops/audit_recent_insider_coverage.py --fresh-feed
        echo "=== Insider Freshness Guard ==="
        python validate_recent_trade_capture.py --checks insider --lookback-days 10 --grace-days 2 --source-limit 120 --sec-pages 3 --parse-limit 40

    - name: Notify on Failure
      if: failure()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        if [ -z "$DISCORD_WEBHOOK_URL" ]; then
          echo "DISCORD_WEBHOOK_URL is not configured; skipping failure notification."
          exit 0
        fi
        curl -H "Content-Type: application/json" -d '{"content": "🚨 **FinLens**: Insider capture workflow failed."}' $DISCORD_WEBHOOK_URL
