name: Capture Congress

on:
  schedule:
    # Poll official House/Senate disclosure sources hourly so new filings are
    # picked up the same day without depending on the full fallback pipeline.
    - cron: '20 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: capture-congress
  cancel-in-progress: true

jobs:
  capture-congress:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install OCR system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr poppler-utils

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run Congress Parser Tests
      if: github.event_name == 'workflow_dispatch'
      working-directory: scripts
      run: |
        python -m pytest test_house_parser_regressions.py -v || python test_house_parser_regressions.py
        python -m pytest test_senate_parser_regressions.py -v || python test_senate_parser_regressions.py
        python -m pytest test_capitol_trades_support.py -v || python test_capitol_trades_support.py
        python test_recent_congress_audit_smoke.py
        python test_schema_performance_indexes.py

    - name: Capture Congress Trades
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        FINLENS_DAILY_MODE: '1'
        PYTHONPATH: ${{ github.workspace }}/scripts:${{ github.workspace }}/ops
        HOUSE_RECENT_SYNC_MAX_PARSE_FAILURES: '3'
        HOUSE_RECENT_SYNC_CARRYOVER_DAYS: '90'
        HOUSE_RECENT_SYNC_CARRYOVER_DOC_LIMIT: '60'
        CAPITOL_TRADES_LOOKBACK_DAYS: '21'
        CAPITOL_TRADES_MAX_PAGES: '20'
        CAPITOL_TRADES_AUDIT_DAYS: '21'
        CAPTURE_FRESHNESS_SOURCE_LIMIT: '100'
        CAPTURE_FRESHNESS_PARSE_LIMIT: '50'
        SCRAPER_TIMEOUT_SECONDS: '600'
      run: |
        cd scripts
        echo "=== House Official Ingest ==="
        python ingest_house_official.py
        echo "=== House Recent Sync ==="
        python sync_recent_house_filings.py
        echo "=== Senate Official Ingest ==="
        python ingest_senate_official.py
        echo "=== Senate Recent Sync ==="
        python sync_recent_senate_filings.py
        echo "=== Member Backfill ==="
        python ../ops/backfill_recent_politician_member_ids.py
        echo "=== Congress Audit ==="
        python ../ops/audit_recent_congress_coverage.py
        echo "=== Capitol Lead Capture ==="
        python capture_capitol_trades_leads.py
        echo "=== Capitol Gap Audit ==="
        python ../ops/audit_capitol_trades_gaps.py
        echo "=== Congress Freshness Guard ==="
        python validate_recent_trade_capture.py --checks congress --lookback-days 10 --grace-days 2 --source-limit 100 --parse-limit 50

    - name: Notify on Failure
      if: failure()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        if [ -z "$DISCORD_WEBHOOK_URL" ]; then
          echo "DISCORD_WEBHOOK_URL is not configured; skipping failure notification."
          exit 0
        fi
        curl -H "Content-Type: application/json" -d '{"content": "🚨 **FinLens**: Congress capture workflow failed."}' $DISCORD_WEBHOOK_URL
